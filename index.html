<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled PDF Viewer</title>
    
    <script src="https://unpkg.com/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://unpkg.com/@tensorflow-models/handpose@0.0.7/dist/handpose.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="sidebar">
        <h2>Controls</h2>
        <input type="file" id="file-input" accept=".pdf">
        <div id="status" class="status loading">Loading Tracking Model...</div>
        <video id="webcam" autoplay playsinline muted></video>
        <div id="gesture-debug" style="font-weight: bold; color: aquamarine;">Fingers: 0</div>
        <p><small>
            <strong>How to use:</strong><br>
            1. Upload a PDF.<br>
            2. Show a <strong>Full Hand (4-5 fingers)</strong> to scroll <strong>DOWN</strong>.<br>
            3. Show <strong>1 Finger (Index)</strong> to scroll <strong>UP</strong>.
        </small></p>
    </div>

    <div id="pdf-container">
        <h3>Upload a PDF to begin</h3>
    </div>
    
<script src="script.js"></script>
</body>
</html>
